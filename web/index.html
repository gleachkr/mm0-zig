<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >
    <title>Aufbau web demo</title>
    <script type="importmap">
    {
      "imports": {
        "@codemirror/state": "https://esm.sh/@codemirror/state",
        "@codemirror/view": "https://esm.sh/@codemirror/view?external=@codemirror/state",
        "@codemirror/commands": "https://esm.sh/@codemirror/commands?external=@codemirror/state,@codemirror/view",
        "@codemirror/lint": "https://esm.sh/@codemirror/lint?external=@codemirror/state,@codemirror/view"
      }
    }
    </script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <dialog id="example-modal" aria-label="Select example">
      <div class="modal-header">
        <span class="modal-title">examples</span>
        <button type="button" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <button
          type="button"
          class="example-button is-active"
          data-example="hilbert"
          aria-pressed="true"
        >
          hilbert
        </button>
        <button
          type="button"
          class="example-button"
          data-example="russell"
          aria-pressed="false"
        >
          russell
        </button>
        <button
          type="button"
          class="example-button"
          data-example="tseitin"
          aria-pressed="false"
        >
          tseitin
        </button>
        <button
          type="button"
          class="example-button"
          data-example="robinson"
          aria-pressed="false"
        >
          robinson
        </button>
        <button
          type="button"
          class="example-button"
          data-example="aristotle"
          aria-pressed="false"
        >
          aristotle
        </button>
        <button
          type="button"
          class="example-button"
          data-example="peirce"
          aria-pressed="false"
        >
          peirce
        </button>
        <button
          type="button"
          class="example-button"
          data-example="gentzen"
          aria-pressed="false"
        >
          gentzen
        </button>
        <button
          type="button"
          class="example-button"
          data-example="prawitz"
          aria-pressed="false"
        >
          prawitz
        </button>
        <button
          type="button"
          class="example-button"
          data-example="barcan"
          aria-pressed="false"
        >
          barcan
        </button>
        <button
          type="button"
          class="example-button"
          data-example="church"
          aria-pressed="false"
        >
          church
        </button>
        <button
          type="button"
          class="example-button"
          data-example="leibniz"
          aria-pressed="false"
        >
          leibniz
        </button>
        <button
          type="button"
          class="example-button"
          data-example="mac_lane"
          aria-pressed="false"
        >
          mac lane
        </button>
        <button
          type="button"
          class="example-button"
          data-example="peano"
          aria-pressed="false"
        >
          peano
        </button>
      </div>
    </dialog>

    <header class="chrome">
      <div class="brand">Aufbau Bytecode Compiler</div>

      <nav class="tab-bar" aria-label="Source panes">
        <button
          type="button"
          class="tab-button is-active"
          data-pane-tab="mm0"
          aria-selected="true"
        >
          MM0
        </button>
        <button
          type="button"
          class="tab-button"
          data-pane-tab="proof"
          aria-selected="false"
        >
          AUF
        </button>
      </nav>
    </header>

    <main class="workspace">
      <article class="pane is-active" data-pane="mm0">
        <div class="pane-header">
          <span>.mm0</span>
          <span id="mm0-meta" class="meta"></span>
        </div>
        <div class="editor-shell" id="mm0-editor"></div>
      </article>

      <article class="pane" data-pane="proof">
        <div class="pane-header">
          <span>.auf</span>
          <span id="proof-meta" class="meta"></span>
        </div>
        <div class="editor-shell" id="proof-editor"></div>
      </article>
    </main>

    <aside class="hud" aria-live="polite">
      <div class="hud-line">
        <span class="hud-label">compile</span>
        <span id="compile-status" class="status warn">loading…</span>
        <span id="compile-time" class="timing"></span>
      </div>
      <div class="hud-line">
        <span class="hud-label">verify</span>
        <span id="verify-status" class="status muted">waiting…</span>
        <span id="verify-time" class="timing"></span>
      </div>
      <div class="hud-line hud-actions">
        <span id="mmb-size" class="meta"></span>
        <div
          id="diagnostic-nav"
          class="diagnostic-nav"
          role="group"
          aria-label="Diagnostic navigation"
          hidden
        >
          <button
            id="diagnostic-prev"
            type="button"
            aria-label="Previous diagnostic"
            disabled
          >
            ←
          </button>
          <button
            id="diagnostic-next"
            type="button"
            aria-label="Next diagnostic"
            disabled
          >
            →
          </button>
        </div>
        <button id="examples-button" type="button">
          hilbert
        </button>
        <button id="theme-toggle" type="button">
          light
        </button>
      </div>
    </aside>

    <script type="module" src="./app.js"></script>
  </body>
</html>
